apiVersion: v1
kind: Service
metadata:
  name: song-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "microservices.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    app: songs-app-pod
  ports:
    - protocol: TCP
      port: {{ .Values.songsService.nodePort }}
      targetPort: {{ .Values.songsService.port }}
