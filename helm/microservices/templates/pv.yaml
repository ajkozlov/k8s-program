apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Values.songsPv.name }}
  labels:
    {{- include "microservices.labels" . | nindent 4 }}
spec:
  storageClassName: {{ .Values.songsPv.storageClassName }}
  capacity:
    storage: {{ .Values.songsPv.storage }}
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: {{ .Values.songsPv.hostPath | quote }}
