apiVersion: v1
kind: Service
metadata:
  name: resources-db-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "microservices.labels" . | nindent 4 }}
spec:
  selector:
    app: resources-db-pod
  clusterIP: None
  ports:
    - port: {{ .Values.resourcesDb.port }}
      name: resources-db
