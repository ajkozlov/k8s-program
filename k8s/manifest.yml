apiVersion: v1
kind: Namespace
metadata: 
  name: k8s-program

---

apiVersion: v1
kind: Service
metadata:
  name: resource-service
  namespace: k8s-program
spec:
  type: NodePort
  selector:
    app: resources-app-pod
  ports:
    - protocol: "TCP"
      port: 8083
      targetPort: 8080

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-deployment
  namespace: k8s-program
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resources-app-pod
  template:
    metadata:
      labels:
        app: resources-app-pod
    spec:
      containers:
        - name: resources-container
          image: k8s/resources-image:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: RESOURCES_DB_URL
              value: resources-db-service
            - name: RESOURCES_DB_PORT
              value: "5433"

---

apiVersion: v1
kind: Service
metadata:
  name: song-service
  namespace: k8s-program
spec:
  type: NodePort
  selector:
    app: songs-app-pod
  ports:
    - protocol: "TCP"
      port: 8084
      targetPort: 8080

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: songs-deployment
  namespace: k8s-program
spec:
  replicas: 2
  selector:
    matchLabels:
      app: songs-app-pod
  template:
    metadata:
      labels:
        app: songs-app-pod
    spec:
      volumes:
        - name: songs-pv-storage
          persistentVolumeClaim:
            claimName: songs-pvc
      containers:
        - name: songs-container
          image: k8s/songs-image
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          volumeMounts:
            - mountPath: "/usr/share/nginx/html"
              name: songs-pv-storage
          env:
            - name: SONGS_DB_URL
              value: songs-db-service
            - name: SONGS_DB_PORT
              value: "5432"